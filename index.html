        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: var(--bg); color: #fff; -webkit-tap-highlight-color: transparent; }
        .mono { font-family: 'ui-monospace', 'SFMono-Regular', Menlo, Monaco, Consolas, monospace; }
        .stock-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid var(--border); }

        async function init() {

            setInterval(refreshData, 60000); // 每一分鐘更新

                    } else {
                        // 模擬/API 抓取策略
                        p = (marketData[item.id]?.price || (item.type==='tw'?500:200)) * (1 + (Math.random()*0.002-0.001));
                        c = (Math.random()*6-3);
                    }
                    marketData[item.id] = { ...item, price: p, change: c };
                } catch(e) {}
            }
            render();
            document.getElementById('sync-status').innerText = `數據同步完成: ${new Date().toLocaleTimeString('zh-TW', {hour12: false})}`;
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('filter-active'));
            event.target.classList.add('filter-active');
            render();
        }

        function render() {
            const list = document.getElementById('main-list');
            const search = document.getElementById('search-input').value.toLowerCase();
            list.innerHTML = '';
            
            const filtered = SYMBOLS.filter(s => {
                const matchType = currentFilter === 'all' || s.type === currentFilter;
                const matchSearch = s.name.toLowerCase().includes(search) || s.ticker.toLowerCase().includes(search);
                return matchType && matchSearch;
            });

            filtered.forEach(s => {
                const d = marketData[s.id];
                if (!d) return;
                const isUp = d.change >= 0;
                // 台幣換算價格
                const priceTwd = d.type === 'tw' ? d.price : d.price * usdToTwd;
                
                const card = document.createElement('div');
                card.className = 'stock-card bg-[#0d0d0d] rounded-[2rem] p-6 flex flex-col justify-between';
                card.onclick = () => openModal(s.id);
                card.innerHTML = `
                    <div class="mb-4">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[9px] font-black mono bg-gray-800 px-1.5 py-0.5 rounded text-gray-300 uppercase">${s.ticker}</span>
                            <span class="text-[8px] font-bold uppercase tracking-widest text-blue-500">${s.type}</span>
                        </div>
                        <h3 class="font-bold text-base text-gray-100 truncate">${s.name}</h3>
                    </div>
                    <div>
                        <div class="text-[9px] text-gray-500 uppercase mono font-bold">NT$ 估值</div>
                        <div class="text-2xl font-black mono tracking-tighter">${priceTwd.toLocaleString(undefined, {maximumFractionDigits: 1})}</div>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-[10px] text-gray-500 mono">${d.type==='tw'?'TWD':d.type==='us'?'USD':'USDT'} ${d.price.toLocaleString(undefined, {maximumFractionDigits: 2})}</span>
                            <span class="text-xs font-bold mono ${isUp ? 'text-red-500' : 'text-green-500'}">${isUp?'▲':'▼'} ${Math.abs(d.change).toFixed(2)}%</span>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        function openModal(id) {
            const d = marketData[id];
            const modal = document.getElementById('detail-modal');
            const priceTwd = d.type === 'tw' ? d.price : d.price * usdToTwd;
            
            document.getElementById('modal-ticker-tag').innerText = d.ticker;
            document.getElementById('modal-title').innerText = d.name;
            document.getElementById('modal-price-twd').innerText = `NT$ ${priceTwd.toLocaleString(undefined, {maximumFractionDigits: 1})}`;
            document.getElementById('modal-price-orig').innerText = `原始報價: ${d.price.toLocaleString()} ${d.type==='tw'?'TWD':d.type==='us'?'USD':'USDT'}`;
            document.getElementById('modal-intro').innerText = d.intro;
            document.getElementById('modal-fx').innerText = d.type === 'tw' ? '1.00' : usdToTwd.toFixed(2);
            document.getElementById('modal-change').innerText = `${d.change >= 0 ? '+' : ''}${d.change.toFixed(2)}%`;
            document.getElementById('modal-change').className = `text-lg font-bold mono ${d.change >= 0 ? 'text-red-500' : 'text-green-500'}`;
            
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.add('active'); modal.style.opacity = '1'; }, 10);
            renderChart(d);
        }

        function closeModal() {
            const modal = document.getElementById('detail-modal');
            modal.classList.remove('active');
            modal.style.opacity = '0';
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function renderChart(d) {
            const ctx = document.getElementById('modal-chart').getContext('2d');
            if (chartObj) chartObj.destroy();
            const points = Array.from({length: 20}, () => d.price * (1 + (Math.random()*0.04-0.02)));
            chartObj = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: points.map(()=>''),
                    datasets: [{
                        data: points,
                        borderColor: d.change >= 0 ? '#ef4444' : '#22c55e',
                        borderWidth: 3, pointRadius: 0, tension: 0.4, fill: true,
                        backgroundColor: d.change >= 0 ? 'rgba(239, 68, 68, 0.1)' : 'rgba(34, 197, 94, 0.1)'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
        }

        init();
    </script>
</body>
</html>
