<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Radar Pro | 真實數據鏈路</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #000; color: #fff; }
        .asset-card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: all 0.2s; }
        .asset-card:hover { border-color: #3b82f6; background: #0f172a; }
        .mono { font-family: 'ui-monospace', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="fixed top-0 left-0 w-full z-[100] h-1 bg-blue-950">
        <div id="progress-bar" class="h-full bg-blue-500 w-0 transition-all duration-700"></div>
    </div>

    <nav class="sticky top-0 z-50 bg-black/90 backdrop-blur-xl border-b border-white/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-600 rounded-lg">
                    <i data-lucide="compass" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tighter uppercase italic">Market <span class="text-blue-500">Radar</span></h1>
                    <p id="sync-status" class="text-[10px] text-gray-500 mono font-bold uppercase">等待數據校準...</p>
                </div>
            </div>
            <div class="text-right">
                <p id="fx-rate" class="text-xs font-bold text-blue-400 mono">USD/TWD: --.--</p>
                <div class="flex items-center justify-end gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 loading-pulse"></span>
                    <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Live Connect</p>
                </div>
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 mt-8">
        <div class="relative">
            <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 w-4 h-4"></i>
            <input type="text" id="search-input" placeholder="搜尋 30+ 標的 (代號或名稱)..." oninput="render()"
                class="w-full bg-[#0d0d0d] border border-white/10 rounded-2xl py-4 pl-14 pr-6 text-sm focus:ring-1 focus:ring-blue-500 outline-none transition-all">
        </div>

        <div class="flex gap-2 mt-6 overflow-x-auto no-scrollbar pb-2">
            <button onclick="setFilter('all', event)" class="filter-btn bg-blue-600 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase whitespace-nowrap">全部市場</button>
            <button onclick="setFilter('tw', event)" class="filter-btn bg-gray-900 text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase whitespace-nowrap">台灣權值</button>
            <button onclick="setFilter('us', event)" class="filter-btn bg-gray-900 text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase whitespace-nowrap">美國科技</button>
            <button onclick="setFilter('crypto', event)" class="filter-btn bg-gray-900 text-gray-400 px-6 py-2 rounded-full text-[10px] font-black uppercase whitespace-nowrap">加密貨幣</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4" id="asset-grid"></main>

    <script>
        // API Key 必須保持為空字串，執行環境會自動注入有效 Key
        const apiKey = ""; 

        const SYMBOLS = [
            { id: '2330.TW', ticker: '2330', name: '台積電', type: 'tw' },
            { id: '2317.TW', ticker: '2317', name: '鴻海', type: 'tw' },
            { id: '2454.TW', ticker: '2454', name: '聯發科', type: 'tw' },
            { id: '2382.TW', ticker: '2382', name: '廣達', type: 'tw' },
            { id: '2308.TW', ticker: '2308', name: '台達電', type: 'tw' },
            { id: '2881.TW', ticker: '2881', name: '富邦金', type: 'tw' },
            { id: '2882.TW', ticker: '2882', name: '國泰金', type: 'tw' },
            { id: '2303.TW', ticker: '2303', name: '聯電', type: 'tw' },
            { id: '2891.TW', ticker: '2891', name: '中信金', type: 'tw' },
            { id: '2603.TW', ticker: '2603', name: '長榮', type: 'tw' },
            { id: '3711.TW', ticker: '3711', name: '日月光投控', type: 'tw' },
            { id: '2412.TW', ticker: '2412', name: '中華電', type: 'tw' },
            { id: '2357.TW', ticker: '2357', name: '華碩', type: 'tw' },
            { id: '3008.TW', ticker: '3008', name: '大立光', type: 'tw' },
            { id: '2609.TW', ticker: '2609', name: '陽明', type: 'tw' },
            { id: 'AAPL', ticker: 'AAPL', name: '蘋果', type: 'us' },
            { id: 'NVDA', ticker: 'NVDA', name: '輝達', type: 'us' },
            { id: 'MSFT', ticker: 'MSFT', name: '微軟', type: 'us' },
            { id: 'TSLA', ticker: 'TSLA', name: '特斯拉', type: 'us' },
            { id: 'GOOGL', ticker: 'GOOGL', name: 'Alphabet', type: 'us' },
            { id: 'AMZN', ticker: 'AMZN', name: '亞馬遜', type: 'us' },
            { id: 'META', ticker: 'META', name: 'Meta', type: 'us' },
            { id: 'BRK.B', ticker: 'BRK.B', name: '波克夏', type: 'us' },
            { id: 'AMD', ticker: 'AMD', name: '超微', type: 'us' },
            { id: 'MSTR', ticker: 'MSTR', name: '微策科技', type: 'us' },
            { id: 'BTCUSDT', ticker: 'BTC', name: '比特幣', type: 'crypto' },
            { id: 'ETHUSDT', ticker: 'ETH', name: '乙太幣', type: 'crypto' },
            { id: 'SOLUSDT', ticker: 'SOL', name: 'Solana', type: 'crypto' },
            { id: 'BNBUSDT', ticker: 'BNB', name: '幣安幣', type: 'crypto' },
            { id: 'DOGEUSDT', ticker: 'DOGE', name: '狗狗幣', type: 'crypto' },
            { id: 'XRPUSDT', ticker: 'XRP', name: '瑞波幣', type: 'crypto' },
            { id: 'ADAUSDT', ticker: 'ADA', name: 'Cardano', type: 'crypto' },
            { id: 'AVAXUSDT', ticker: 'AVAX', name: 'Avalanche', type: 'crypto' }
        ];

        let marketData = {};
        let usdToTwd = 32.5;
        let currentFilter = 'all';

        // 強化版 API 請求工具：包含自動指數退避
        async function fetchWithRetry(url, options = {}, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        // 如果是 401 且我們手動加了 Key，可能是因為 Key 為空造成的
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return await response.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                    const delay = Math.pow(2, i) * 1000;
                    await new Promise(res => setTimeout(res, delay));
                }
            }
        }

        async function syncData() {
            const pb = document.getElementById('progress-bar');
            pb.style.width = '20%';
            
            try {
                // 1. 獲取匯率 (無需 Key)
                const fxData = await fetchWithRetry('https://api.exchangerate-api.com/v4/latest/USD');
                usdToTwd = fxData.rates.TWD;
                document.getElementById('fx-rate').innerText = `USD/TWD: ${usdToTwd.toFixed(2)}`;
                pb.style.width = '40%';

                // 2. 獲取加密貨幣 (Binance 無需 Key)
                const cryptos = await fetchWithRetry('https://api.binance.com/api/v3/ticker/24hr');
                pb.style.width = '60%';

                // 3. 獲取股票數據 (Gemini 2.5 Flash)
                // 注意：環境會自動處理 apiKey 注入，這裡保持 URL 乾淨
                const stockTickers = SYMBOLS.filter(s => s.type !== 'crypto').map(s => s.ticker).join(", ");
                const searchPrompt = `提供以下標的的即時收盤價與漲跌幅：${stockTickers}。必須回傳純 JSON 物件：{"TICKER": {"p": 價格, "c": 漲跌幅}}`;

                // 修正：不要在 URL 手動拼接 ?key=${apiKey}，如果 apiKey 為空，系統會自動在請求頭注入密鑰
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent${apiKey ? `?key=${apiKey}` : ''}`;
                
                const aiRes = await fetchWithRetry(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: searchPrompt }] }],
                        tools: [{ "google_search": {} }]
                    })
                });
                
                const rawText = aiRes.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                
                let priceMap = {};
                try {
                    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        priceMap = JSON.parse(jsonMatch[0]);
                    }
                } catch (e) { 
                    console.error("JSON 解析失敗", e); 
                }

                // 數據更新整合
                SYMBOLS.forEach(s => {
                    if (s.type === 'crypto') {
                        const t = Array.isArray(cryptos) ? cryptos.find(c => c.symbol === s.id) : null;
                        if (t) marketData[s.id] = { price: parseFloat(t.lastPrice), change: parseFloat(t.priceChangePercent) };
                    } else {
                        const t = priceMap[s.ticker] || priceMap[s.id];
                        if (t && typeof t.p === 'number') {
                            marketData[s.id] = { price: t.p, change: t.c || 0 };
                        }
                    }
                });

                document.getElementById('sync-status').innerText = `更新完成: ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                console.error("同步失敗", err);
                document.getElementById('sync-status').innerText = "連線驗證受阻，系統自動重試中...";
            } finally {
                pb.style.width = '100%';
                setTimeout(() => pb.style.width = '0%', 1000);
                render();
            }
        }

        function render() {
            const grid = document.getElementById('asset-grid');
            const search = document.getElementById('search-input').value.toLowerCase();
            grid.innerHTML = '';

            SYMBOLS.filter(s => {
                const matchType = currentFilter === 'all' || s.type === currentFilter;
                const matchSearch = s.name.includes(search) || s.ticker.toLowerCase().includes(search);
                return matchType && matchSearch;
            }).forEach(s => {
                const data = marketData[s.id] || { price: 0, change: 0 };
                const displayPrice = s.type === 'tw' ? data.price : data.price * usdToTwd;
                const isUp = data.change >= 0;

                const card = document.createElement('div');
                card.className = 'asset-card rounded-2xl p-4 flex flex-col justify-between h-32 cursor-pointer';
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[8px] mono font-bold text-blue-500 uppercase">${s.ticker}</p>
                            <h3 class="text-xs font-black text-gray-200 truncate w-24">${s.name}</h3>
                        </div>
                        <span class="text-[9px] font-black mono ${isUp ? 'text-red-500' : 'text-green-500'}">
                            ${isUp ? '▲' : '▼'} ${Math.abs(data.change).toFixed(2)}%
                        </span>
                    </div>
                    <div>
                        <div class="text-lg font-black mono tracking-tighter">
                            ${displayPrice > 0 ? 'NT$ ' + displayPrice.toLocaleString(undefined, {maximumFractionDigits: displayPrice < 100 ? 2 : 1}) : '載入中...'}
                        </div>
                        <p class="text-[8px] text-gray-600 font-bold mono uppercase">${data.price.toLocaleString()} ${s.type === 'tw' ? 'TWD' : 'USD'}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        function setFilter(type, event) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-gray-900', 'text-gray-400');
            });
            event.target.classList.remove('bg-gray-900', 'text-gray-400');
            event.target.classList.add('bg-blue-600', 'text-white');
            render();
        }

        window.onload = () => {
            syncData();
            setInterval(syncData, 60000);
        };
    </script>
</body>
</html>
